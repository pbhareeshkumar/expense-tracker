<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Expense Tracker</h1>

    <form id="expense-form">
        <div class="amount-wrapper">
            <input type = "number" id = "amount" placeholder="Amount" required min="0">
            <button type="button" id="clear-amount">Clear</button>
        </div>
        <div id="quick-amounts">
            <button type="button" data-value="5">+5</button>
            <button type="button" data-value="10">+10</button>
            <button type="button" data-value="20">+20</button>
            <button type="button" data-value="50">+50</button>
            <button type="button" data-value="100">+100</button>
            <button type="button" data-value="500">+500</button>
        </div>
        <input type = "text" id = "category" placeholder="Category" required>
        <input type = "date" id = "date" placeholder="Date" required>
        <input type = "text" id = "note" placeholder="Note (optional)">
        <button type = "submit">Add Expense</button>
    </form>

    <h2>Totals by Category</h2>
    <ul id ="totals-list"></ul>

    <h2>Expenses</h2>
    <ul id="expense-list"></ul>

    <div id ="edit-modal" class="hidden">
        <div class = "modal-box">
            <p>Edit Expenses</p>
            <input type="number" id="edit-amount" placeholder="Amount" required min="0">
            <input type="text" id="edit-category" placeholder="Category" required>
            <input type="date" id="edit-date" required>
            <input type="text" id="edit-note" placeholder="Note (optional)">
            <button id="edit-save">Save</button>
            <button id="edit-cancel">Cancel</button>
        </div>
    </div>

    <div id="confirm-modal" class="hidden">
        <div class="modal-box">
            <p>Are you sure you want to delete this expense?</p>
            <button id="confirm-yes">Yes, Delete</button>
            <button id="confirm-no">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
